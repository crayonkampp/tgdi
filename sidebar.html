<!DOCTYPE html>
<html>
<head>

  <style>
    body {

      background: #151d14;
      margin: 0;
    }
    #sidebar {
      width: 320px;
      background: linear-gradient(135deg, #212d1e 90%, #2e4123 100%);
      border-radius: 18px;
      padding: 26px 18px 18px 18px;
      box-shadow: 0 4px 16px #1c2320 inset, 0 0 0 4px #302b22;
      margin: 0;
      border: 2px solid #938249;
      position: relative;
    }
    .header {
      font-family: 'IM Fell English SC', serif;
      font-size: 2em;
      color: #c0aa6d;
      text-shadow: 0 2px 1px #2e2308, 0 0px 16px #473d22;
      margin: 0 0 20px 0;
      letter-spacing: 1px;
      text-align: center;
    }
    .section {
      margin-bottom: 20px;
      background: rgba(37, 45, 28, 0.93);
      border: 1px solid #6a6845;
      border-radius: 8px;
      padding: 12px 16px;
      box-shadow: 0 1px 3px #19110d32 inset;
    }
    .section .title {
      font-family: 'IM Fell English SC', serif;
      color: #d6b45a;
      font-size: 1.18em;
      margin-bottom: 7px;
      letter-spacing: 0.3px;
    }
    .member-list {
      font-family: 'IM Fell English SC', serif;
      padding: 0; margin: 0; list-style: none;
    }
    .member-list li {
      margin-bottom: 4px;
      color: #8def73;
    }
    a {
      color: #c0b042;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.2s;
    }
    a:hover {
      color: #fde47c;
      text-shadow: 0 0 2px #b39d62;
    }
    .footer {
      text-align: center;
      margin-top: 10px;
      color: #a79358;
      font-size: 0.98em;
      text-shadow: 0px 1px 2px #201905;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <div class="header">
      The Green Dragon Inn
    </div>
    <div class="section">
      <div class="title">Clubfolk Gathered in the Inn</div>
      <div id="member-count">Counting guests...</div>
    </div>
    <div class="section" id="arrivals-section">
      <div class="title">Newest Arrivals</div>
      <ul id="new-members" class="member-list"></ul>
    </div>
    <div class="section" style="text-align:center;">
      <a href="https://www.chess.com/club/the-green-dragon-inn" target="_blank">
        Enter the Inn &rarr;
      </a>
    </div>
    <div class="footer">
      “It's a dangerous business, Frodo, going out your door…”
    </div>
  </div>

            membersMap[m.username] = m;
          }
        }
