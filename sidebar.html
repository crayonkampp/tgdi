<!DOCTYPE html>
<html>
<head>
  <title>The Green Dragon Inn - Club Sidebar</title>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'IM Fell English SC', 'UnifrakturCook', serif;
      background: #eee8d5;
      margin: 0;
    }
    #sidebar {
      width: 320px;
      background: #f9f5ea url('https://www.transparenttextures.com/patterns/old-wall.png');
      border-radius: 18px;
      padding: 24px 18px 18px 18px;
      box-shadow: 0 5px 18px #857c60, 0 0px 0px #86692a;
      margin: 0;
      border: 3px double #908559;
      position: relative;
    }
    .header {
      font-family: 'UnifrakturCook', 'IM Fell English SC', serif;
      font-size: 2em;
      color: #39693a;
      text-shadow: 1px 1px 0 #cec293, 2px 2px 0 #be9e43;
      margin: 0 0 18px 0;
      letter-spacing: 1px;
      text-align: center;
    }
    .section {
      margin-bottom: 18px;
      background: rgba(247, 241, 222, 0.92);
      border: 1px solid #d3bf80;
      border-radius: 8px;
      padding: 10px 14px;
      box-shadow: 0 1px 3px #fff5d0 inset;
    }
    .section .title {
      font-family: 'IM Fell English SC', serif;
      color: #7c770b;
      font-size: 1.1em;
      margin-bottom: 7px;
      letter-spacing: 0.5px;
    }
    .member-list {
      font-family: 'IM Fell English SC', serif;
      padding: 0; margin: 0; list-style: none;
    }
    .member-list li {
      margin-bottom: 4px;
      color: #325c35;
    }
    a {
      color: #477726;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.2s;
    }
    a:hover {
      color: #b88f2b;
      text-shadow: 0 0 3px #ede2b3;
    }
    .footer {
      text-align: center;
      margin-top: 10px;
      color: #8d864a;
      font-size: 0.92em;
    }
    .rings {
      text-align: center;
      margin-bottom: 12px;
      font-size: 1.8em;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <div class="header">
      ☘️ The Green Dragon Inn ☘️
    </div>
    <div class="rings">
      <span title="The One Ring">💍</span> <span title="Elven ring">🧝‍♂️</span>
      <span title="Dwarven ring">⛏️</span> <span title="Hobbit">🥕</span>
    </div>
    <div class="section">
      <div class="title">Clubfolk Gathered in the Inn</div>
      <div id="member-count">Counting hobbits...</div>
    </div>
    <div class="section">
      <div class="title">Newest Arrivals</div>
      <ul id="new-members" class="member-list"></ul>
    </div>
    <div class="section" style="text-align:center;">
      <a href="https://www.chess.com/club/the-green-dragon-inn" target="_blank">
        Enter The Green Dragon &rarr;
      </a>
    </div>
    <div class="footer">
      “It’s a dangerous business, Frodo, going out your door…”
    </div>
  </div>
  <script>
    // Club slug for The Green Dragon Inn
    const clubSlug = "the-green-dragon-inn";
    fetch(`https://api.chess.com/pub/club/${clubSlug}/members`)
      .then(res => res.json())
      .then(data => {
        const allMembers = [].concat(
          data.week || [],
          data.month || [],
          data.all_time || []
        );
        const uniqueMembers = Array.from(new Set(allMembers.map(m => m.username)));
        document.getElementById('member-count').textContent =
          uniqueMembers.length + " free folk";
        // Show up to 5 most recent this week
        const newMembers = (data.week || []).slice(0, 5);
        const ul = document.getElementById('new-members');
        ul.innerHTML = newMembers.length
          ? newMembers.map(m =>
              `<li><a href="https://www.chess.com/member/${m.username}" target="_blank">${m.username}</a></li>`
            ).join('')
          : "<li>No new arrivals this week</li>";
      })
      .catch(error => {
        document.getElementById('member-count').textContent = "Unable to count the guests!";
      });
  </script>
</body>
</html>
